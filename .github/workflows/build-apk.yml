name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ① 拉取代码
        uses: actions/checkout@v4

      - name: ② 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ③ 设置 Android SDK 并编译
        run: |
          # Download Android command-line tools
          curl -s -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

          # Accept licenses & install SDK packages
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

          # Generate gradle wrapper
          cd android
          mkdir -p gradle/wrapper
          # Download gradle wrapper jar
          curl -s -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          # Create gradlew script
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          # Gradle wrapper script
          APP_HOME=$(cd "$(dirname "$0")" && pwd)
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          export ANDROID_HOME=${ANDROID_HOME:-$HOME/android-sdk}
          export ANDROID_SDK_ROOT=${ANDROID_HOME}
          exec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x gradlew

          # Build APK
          ./gradlew assembleDebug --no-daemon

      - name: ④ 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: FitPlan-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
