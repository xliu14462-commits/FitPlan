name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          set -e
          SDK_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          curl -s -o /tmp/sdk.zip "$SDK_URL"
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/sdk.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" "platforms;android-35" "build-tools;35.0.0" > /dev/null 2>&1
          echo "SDK setup done"

      - name: Setup Gradle
        run: |
          set -e
          cd android
          GRADLE_VER=8.5
          curl -s -L -o /tmp/gradle.zip "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip"
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "GRADLE_HOME=/tmp/gradle-${GRADLE_VER}" >> $GITHUB_ENV
          echo "Gradle setup done"

      - name: Build APK
        run: |
          set -e
          export ANDROID_HOME=${ANDROID_HOME:-$HOME/android-sdk}
          cd android
          $GRADLE_HOME/bin/gradle assembleDebug --no-daemon --warning-mode all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitPlan-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
