name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: reactnativecommunity/react-native-android:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cd android
          # The image has gradle wrapper setup, or use system gradle
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon --stacktrace
          elif command -v gradle &> /dev/null; then
            gradle assembleDebug --no-daemon --stacktrace
          else
            echo "No gradle found, downloading..."
            curl -L -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            /tmp/gradle-8.5/bin/gradle assembleDebug --no-daemon --stacktrace
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: FitPlan-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
